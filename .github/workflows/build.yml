name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy GitHub Pages'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '>=3.13'
    - uses: emscripten-core/setup-emsdk@v16
    - name: Install Dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y mingw-w64 gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib
        python -m pip install jinja2
    - name: Setup SDL (linux)
      uses: libsdl-org/setup-sdl@main
      id: sdl_linux
      with:
        install-linux-dependencies: true
        version: 3-latest
        build-type: Release
        cmake-arguments: -DSDL_STATIC=ON -DSDL_SHARED=OFF -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=${{ github.workspace }}/sdl-settings.cmake
    - name: Setup SDL (windows)
      uses: libsdl-org/setup-sdl@main
      id: sdl_win
      with:
        version: 3-latest
        build-type: Release
        cmake-arguments: -DSDL_STATIC=ON -DSDL_SHARED=OFF -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=${{ github.workspace }}/sdl-settings.cmake
        cmake-toolchain-file: tc-mingw.cmake
    - name: Setup SDL (emscripten)
      uses: libsdl-org/setup-sdl@main
      id: sdl_emscripten
      with:
        version: 3-latest
        build-type: Release
        cmake-arguments: -DSDL_STATIC=ON -DSDL_SHARED=OFF -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=${{ github.workspace }}/sdl-settings.cmake
        cmake-toolchain-file: ${{ env.EMSDK }}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake
    - name: Build octemu (linux)
      env:
        SDL3_ROOT: ${{ steps.sdl_linux.outputs.prefix }}
      run: cmake -B build-linux -DCMAKE_BUILD_TYPE=Release && cmake --build build-linux
    - name: Build octemu (windows)
      env:
        SDL3_ROOT: ${{ steps.sdl_win.outputs.prefix }}
      run: |
        cmake -B build-windows -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=tc-mingw.cmake
        cmake --build build-windows
    - name: Build octemu (emscripten)
      env:
        SDL3_ROOT: ${{ steps.sdl_emscripten.outputs.prefix }}
      run: |
        emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH
        cmake --build build-web
    - name: Build octemu (pico)
      run: |
        cmake -S pico -B build-pico -DCMAKE_BUILD_TYPE=Release -DPICO_BOARD=pico -DOCTEMU_PICO_ROTATE_SCREEN=ON
        cmake --build build-pico
    - name: Build octemu (pico2)
      run: |
        cmake -S pico -B build-pico2 -DCMAKE_BUILD_TYPE=Release -DPICO_BOARD=pico2 -DOCTEMU_PICO_ROTATE_SCREEN=ON
        cmake --build build-pico2
    - name: Prepare Artifacts
      run: |
        mkdir -p build web
        cp build-linux/octemu build/octemu_${{ github.ref_name }}
        cp build-windows/octemu.exe build/octemu_${{ github.ref_name }}.exe
        cp build-pico/octemu-pico.uf2 build/octemu-pico_pico_${{ github.ref_name }}.uf2
        cp build-pico2/octemu-pico.uf2 build/octemu-pico_pico2_${{ github.ref_name }}.uf2
        cp build-web/octemu.js build-web/octemu.wasm build-web/index.html web/
        cp -r build-web/roms web/
    - uses: actions/upload-artifact@v7
      with:
        path: build/*
        name: octemu
    - uses: actions/upload-pages-artifact@v5
      with:
        path: web/

  release:
    needs: build
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
    - uses: actions/download-artifact@v8
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      with:
        name: octemu
        path: build/
    - uses: ncipollo/release-action@v1
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      with:
        name: ${{ github.ref_name }}
        draft: true
        artifacts: build/*
    - uses: actions/deploy-pages@v5
